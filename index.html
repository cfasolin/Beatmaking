<!DOCTYPE html>
<html lang =fr>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Beatmaker Politics Mix</title>
    </head>
    <body>
        <header>
            <h1>BPM<br>
            <h2>Beatmaker Politiks Mix</h2>
        </header>
        <div id="btntempo">
        <span id="starttempo"><button>Play</button></span>
        <span id="stoptempo"><button>Stop</button></span></div>

        <div id="metronome">
            <span class="bttmnt">1</span>
            <span class="bttmnt">2</span>
            <span class="bttmnt">3</span>
            <span class="bttmnt">4</span>
        </div>

        <section id="sounds">
            <div id="drums">
                <h3>Drums</h3>
                <button class="playbuttons" id="btndrums1">Drums 1</button>
                <audio id="drums1" src="Sons/Drums/dancehall.mp3"></audio>

                <button class="playbuttons" id="btndrums2">Drums 2</button>
                <audio id="drums2" src="Sons/Drums/c-loop.wav"></audio>

                <button class="playbuttons" id="btndrums3">Drums 3</button>
                <audio id="drums3" src="Sons/Drums/reggae.wav"></audio>
            </div>

            <div id="bass">
                <h3>Bass</h3>
                <button class="playbuttons" id="btnbass1">Bass 1</button>
                <audio id="bass1" src ="Sons/Bass/future-house-bass_Gsh_minor.wav"></audio>


                <button class="playbuttons" id="btnbass2">Bass 2</button>
                <audio id="bass2" src ="Sons/Bass/progression-punchy_Gsh_minor.wav"></audio>
            </div>

            <div id="FX">
                <h3>FX & Synths</h3>
                <button class="playbuttons" id="btnfx1">FX 1</button>
                <audio id="fx1" src ="Sons/FX/muted-house-organ-Gsh_minor.wav"></audio>

                <button class="playbuttons" id="btnfx2">FX 2</button>
                <audio id="fx2" src ="Sons/FX/wet-interstellar-synth-Gsh_minor.wav"></audio>

            </div>
            <div id="vocals">
                <h3>Vocal Samples</h3>
                <button class="playbuttons" id="btntaisezvous">TAISEZ-VOUS!</button>
                <audio id="taisezvous" src="Sons/Vocals/taisez-vous.mp3"></audio>

                <button class="playbuttons" id="btnforsure">For Sure</button>
                <audio id="forsure" src="Sons/Vocals/macron-for-sure.mp3"></audio>

                <button class="playbuttons" id="btndemandearreter">Je vous demande de vous arrêter</button>
                <audio id="demandearreter" src="Sons/Vocals/006_je_vous_demande.mp3"></audio>

                <button class="playbuttons" id="btnchiracsourire">Ca m'a fait sourire</button>
                <audio id="chiracsourire" src="Sons/Vocals/chirac_sourire.mp3"></audio>

                </div>
        </section>
        
        <script src="script.js"></script>
    </body>
</html>
